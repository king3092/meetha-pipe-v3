<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaSignal | BTC & XAU Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <header>
        <h1>ALPHASIGNAL <span>v1.0</span></h1>
        <div class="controls">
            <button id="tf-5m">5M</button>
            <button id="tf-15m" class="active">15M</button>
        </div>
    </header>

    <main class="dashboard">
        <section class="asset-card" id="btc-card">
            <div class="panel-header">
                <h2>BTC / USDT</h2>
                <div id="btc-consensus" class="badge">WAIT</div>
            </div>
            <div class="signals-grid">
                <div class="sig-box"><span>5M:</span> <b id="btc-5m">-</b></div>
                <div class="sig-box"><span>15M:</span> <b id="btc-15m">-</b></div>
            </div>
            <div class="trade-info">
                <p>Entry: <span id="btc-entry">0.00</span></p>
                <p>SL: <span id="btc-sl">0.00</span></p>
                <p>TP: <span id="btc-tp">0.00</span></p>
            </div>
            <div id="btc-chart" class="chart-container"></div>
        </section>

        <section class="asset-card" id="xau-card">
            <div class="panel-header">
                <h2>XAU / USD (GOLD)</h2>
                <div id="xau-consensus" class="badge">WAIT</div>
            </div>
            <div class="signals-grid">
                <div class="sig-box"><span>5M:</span> <b id="xau-5m">-</b></div>
                <div class="sig-box"><span>15M:</span> <b id="xau-15m">-</b></div>
            </div>
            <div class="trade-info">
                <p>Entry: <span id="xau-entry">0.00</span></p>
                <p>SL: <span id="xau-sl">0.00</span></p>
                <p>TP: <span id="xau-tp">0.00</span></p>
            </div>
            <div class="chart-container" id="xau-widget-container">
                <div class="tradingview-widget-container">
                    <div id="tradingview_xau"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                    <script type="text/javascript">
                        new TradingView.widget({
                            "autosize": true,
                            "symbol": "OANDA:XAUUSD",
                            "interval": "15",
                            "timezone": "Etc/UTC",
                            "theme": "dark",
                            "style": "1",
                            "locale": "en",
                            "toolbar_bg": "#f1f3f6",
                            "enable_publishing": false,
                            "hide_top_toolbar": true,
                            "save_image": false,
                            "container_id": "tradingview_xau"
                        });
                    </script>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>⚠️ Trading involves risk. Risk only 1–2% per trade. Data provided for educational purposes.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
