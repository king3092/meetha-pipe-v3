<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetha Pipe V3 - Trading Signals</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <header>
        <h1>Meetha Pipe V3</h1>
        <div class="timeframe-buttons">
            <button data-timeframe="15">15M</button>
            <button data-timeframe="5">5M</button>
        </div>
    </header>

    <main>
        <section class="asset-panel" id="xauusd-panel">
            <h2>XAU/USD</h2>
            <div class="signal-panel">
                <p>15M Signal: <span id="xau-15m-signal">--</span></p>
                <p>5M Signal: <span id="xau-5m-signal">--</span></p>
                <p>Consensus: <span id="xau-consensus">--</span></p>
                <p>Entry: <span id="xau-entry">--</span></p>
                <p>Stop Loss: <span id="xau-sl">--</span></p>
                <p>Take Profit: <span id="xau-tp">--</span></p>
            </div>
        </section>

        <section class="asset-panel" id="btcusd-panel">
            <h2>BTC/USD</h2>
            <div class="signal-panel">
                <p>15M Signal: <span id="btc-15m-signal">--</span></p>
                <p>5M Signal: <span id="btc-5m-signal">--</span></p>
                <p>Consensus: <span id="btc-consensus">--</span></p>
                <p>Entry: <span id="btc-entry">--</span></p>
                <p>Stop Loss: <span id="btc-sl">--</span></p>
                <p>Take Profit: <span id="btc-tp">--</span></p>
            </div>
        </section>

        <section id="chart-container"></section>
        <p class="disclaimer">Trading involves risk. Risk 1–2% per trade.</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
