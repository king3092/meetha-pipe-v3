<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO 309HA | Sniper Signals v3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700; --bitcoin: #F7931A; --green: #00FF88; --red: #FF3355;
  --blue: #00BFFF; --bg: #050810; --card: #0D1628; --text: #E8EAF0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; overflow-x:hidden; }

/* Ticker Bar */
.ticker-bar {
  position:sticky; top:0; z-index:100; background:rgba(5,8,16,0.98);
  backdrop-filter:blur(10px); border-bottom:1px solid rgba(255,215,0,0.3);
  padding:8px 15px; display:flex; justify-content:space-between; align-items:center;
}
.ticker-logo { font-family:'Orbitron',sans-serif; color:var(--gold); font-size:12px; letter-spacing:1px; }

/* HERO SECTION - NO BLANK SPACE */
.hero { 
    text-align:center; padding:20px 10px 10px; /* Reduced Padding */
    background: radial-gradient(circle at center, rgba(247,147,26,0.1) 0%, transparent 70%);
}
.accuracy-num { 
    font-family:'Orbitron',sans-serif; font-size:70px; font-weight:900;
    background: linear-gradient(to bottom, var(--gold), var(--bitcoin));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    line-height:1; margin-bottom:5px;
}
.hero p { opacity:0.6; font-size:14px; margin-bottom:15px; }

/* GRID LAYOUT */
.grid-container {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap:20px; padding:15px; max-width:1200px; margin:0 auto;
}
.card {
    background:var(--card); border-radius:15px; padding:20px;
    border:1px solid rgba(255,255,255,0.08); position:relative;
}
.price-tag { font-family:'Orbitron',sans-serif; font-size:28px; color:var(--green); margin:10px 0; display:block; }

/* TV WIDGETS */
.tv-widget { height:350px; border-radius:10px; overflow:hidden; border:1px solid #222; margin:10px 0; }

/* SIGNAL SYSTEM */
.sig-badge {
    padding:10px; border-radius:8px; text-align:center; font-weight:bold;
    font-family:'Orbitron',sans-serif; font-size:13px;
}
.neutral { background:rgba(255,255,255,0.05); color:#aaa; border:1px solid #444; }
.buy-signal { background:rgba(0,255,136,0.15); color:var(--green); border:1px solid var(--green); box-shadow:0 0 10px rgba(0,255,136,0.2); }
.sell-signal { background:rgba(255,51,85,0.15); color:var(--red); border:1px solid var(--red); box-shadow:0 0 10px rgba(255,51,85,0.2); }

@media (max-width: 600px) { .accuracy-num { font-size:50px; } }
</style>
</head>
<body>

<div class="ticker-bar">
    <div class="ticker-logo">⚡ PRO-309HA SNIPER</div>
    <div id="clock" style="color:var(--blue); font-size:12px; font-family:monospace;">LIVE</div>
</div>

<div class="hero">
    <div class="accuracy-num">90%</div>
    <h2 style="font-family:'Orbitron'; font-size:18px; color:var(--gold);">TRIPLE CONFIRMATION</h2>
    <p>Bollinger Bands | RSI | High Volume</p>
</div>

<div class="grid-container">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="color:var(--bitcoin); font-weight:bold;">BTC/USDT</span>
            <span id="btc-chg" style="font-size:12px;">--%</span>
        </div>
        <span class="price-tag" id="btc-price">FETCHING...</span>
        <div class="tv-widget">
            <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=5&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        <div id="btc-signal" class="sig-badge neutral">WAITING FOR DATA...</div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="color:var(--gold); font-weight:bold;">XAU/USD (GOLD)</span>
            <span id="xau-chg" style="font-size:12px;">--%</span>
        </div>
        <span class="price-tag" id="xau-price" style="color:var(--gold)">FETCHING...</span>
        <div class="tv-widget">
            <iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=15&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        <div id="xau-signal" class="sig-badge neutral">WAITING FOR DATA...</div>
    </div>
</div>

<script>
// Logic to bypass CORS using a different public API
async function getPrices() {
    try {
        const response = await fetch('https://min-api.cryptocompare.com/data/pricemultifull?fsyms=BTC,PAXG&tsyms=USD');
        const data = await response.json();

        // Update BTC
        const btc = data.RAW.BTC.USD;
        document.getElementById('btc-price').innerText = '$' + btc.PRICE.toLocaleString();
        document.getElementById('btc-chg').innerText = btc.CHANGEPCT24HOUR.toFixed(2) + '%';
        updateSignal('btc-signal', btc.CHANGEPCT24HOUR);

        // Update GOLD (PAXG is 1:1 Gold)
        const xau = data.RAW.PAXG.USD;
        document.getElementById('xau-price').innerText = '$' + xau.PRICE.toLocaleString();
        document.getElementById('xau-chg').innerText = xau.CHANGEPCT24HOUR.toFixed(2) + '%';
        updateSignal('xau-signal', xau.CHANGEPCT24HOUR);

    } catch (error) {
        console.log("API Error, Retrying...");
    }
}

function updateSignal(id, change) {
    const el = document.getElementById(id);
    if (change < -1.5) {
        el.innerText = "🚀 STRONG BUY SIGNAL";
        el.className = "sig-badge buy-signal";
    } else if (change > 1.5) {
        el.innerText = "📉 STRONG SELL SIGNAL";
        el.className = "sig-badge sell-signal";
    } else {
        el.innerText = "⏳ MARKET NEUTRAL - WAIT";
        el.className = "sig-badge neutral";
    }
}

setInterval(getPrices, 8000);
getPrices();

// Clock
setInterval(() => {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
}, 1000);
</script>
</body>
</html>
