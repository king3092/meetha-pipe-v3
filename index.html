<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuantEdge AI — Professional Trading Signals</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg-deep: #060910;
    --bg-card: #0c1118;
    --bg-panel: #111923;
    --bg-hover: #161e2a;
    --border: #1e2d3d;
    --border-bright: #2a3f55;
    --accent-cyan: #00d4ff;
    --accent-blue: #0066ff;
    --accent-green: #00ff88;
    --accent-red: #ff3366;
    --accent-yellow: #ffd700;
    --accent-orange: #ff6b35;
    --text-primary: #e8f4f8;
    --text-secondary: #7a9bb5;
    --text-muted: #3d5a73;
    --glow-cyan: 0 0 20px rgba(0,212,255,0.3);
    --glow-green: 0 0 20px rgba(0,255,136,0.3);
    --glow-red: 0 0 20px rgba(255,51,102,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,102,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 90% 80%, rgba(0,212,255,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .mono { font-family: 'Space Mono', monospace; }
  .display { font-family: 'Bebas Neue', sans-serif; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  /* Header */
  .header {
    background: rgba(6,9,16,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-text { font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; font-size: 22px; }
  .logo-accent { color: var(--accent-cyan); }

  /* Live indicator dot */
  .live-dot {
    width: 8px; height: 8px;
    background: var(--accent-green);
    border-radius: 50%;
    animation: pulse-dot 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent-green);
  }
  @keyframes pulse-dot {
    0%,100% { opacity:1; transform: scale(1); }
    50% { opacity:0.4; transform: scale(0.7); }
  }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
  }
  .card-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.02);
  }
  .card-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* Price Ticker */
  .ticker-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .ticker-row:hover { background: var(--bg-hover); }
  .ticker-row.active { background: rgba(0,212,255,0.06); border: 1px solid rgba(0,212,255,0.2); }
  .price-display {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .price-change { font-family: 'Space Mono', monospace; font-size: 11px; }
  .up { color: var(--accent-green); }
  .down { color: var(--accent-red); }
  .neutral { color: var(--accent-yellow); }

  /* Signal Box */
  .signal-box {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    padding: 2px;
    transition: all 0.4s;
  }
  .signal-box.buy { background: linear-gradient(135deg, rgba(0,255,136,0.3), rgba(0,212,255,0.1)); box-shadow: var(--glow-green); }
  .signal-box.sell { background: linear-gradient(135deg, rgba(255,51,102,0.3), rgba(255,107,53,0.1)); box-shadow: var(--glow-red); }
  .signal-box.wait { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(58,90,120,0.2)); }
  .signal-box-inner {
    background: var(--bg-card);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
  }
  .signal-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 6px;
    line-height: 1;
  }
  .buy .signal-label { color: var(--accent-green); text-shadow: 0 0 30px rgba(0,255,136,0.5); }
  .sell .signal-label { color: var(--accent-red); text-shadow: 0 0 30px rgba(255,51,102,0.5); }
  .wait .signal-label { color: var(--accent-yellow); }

  /* Confidence Meter */
  .conf-bar-wrap {
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
    position: relative;
  }
  .conf-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .conf-bar::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; right: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
  }
  .conf-high { background: linear-gradient(90deg, #00ff88, #00d4ff); }
  .conf-med { background: linear-gradient(90deg, #ffd700, #ff6b35); }
  .conf-low { background: linear-gradient(90deg, #ff3366, #990033); }

  /* TP/SL Display */
  .risk-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    position: relative;
    overflow: hidden;
  }
  .risk-item.tp { border-left: 2px solid var(--accent-green); }
  .risk-item.sl { border-left: 2px solid var(--accent-red); }
  .risk-item.entry { border-left: 2px solid var(--accent-cyan); }
  .risk-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .risk-val {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    margin-top: 2px;
  }
  .tp .risk-val { color: var(--accent-green); }
  .sl .risk-val { color: var(--accent-red); }
  .entry .risk-val { color: var(--accent-cyan); }

  /* Indicator Badge */
  .ind-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    border: 1px solid;
  }
  .ind-bull { background: rgba(0,255,136,0.08); border-color: rgba(0,255,136,0.25); color: var(--accent-green); }
  .ind-bear { background: rgba(255,51,102,0.08); border-color: rgba(255,51,102,0.25); color: var(--accent-red); }
  .ind-neut { background: rgba(255,215,0,0.08); border-color: rgba(255,215,0,0.25); color: var(--accent-yellow); }

  /* Signal History */
  .hist-row {
    display: grid;
    grid-template-columns: 55px 60px 90px 75px 75px 55px 60px;
    gap: 4px;
    padding: 7px 10px;
    border-bottom: 1px solid rgba(30,45,61,0.5);
    align-items: center;
    transition: background 0.15s;
  }
  .hist-row:hover { background: rgba(255,255,255,0.02); }
  .hist-row.header-row {
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
  }
  .sig-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 2px 7px;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .sig-buy { background: rgba(0,255,136,0.15); color: var(--accent-green); border: 1px solid rgba(0,255,136,0.3); }
  .sig-sell { background: rgba(255,51,102,0.15); color: var(--accent-red); border: 1px solid rgba(255,51,102,0.3); }
  .sig-wait { background: rgba(255,215,0,0.1); color: var(--accent-yellow); border: 1px solid rgba(255,215,0,0.25); }
  .sig-win { color: var(--accent-green); }
  .sig-loss { color: var(--accent-red); }
  .sig-open { color: var(--accent-yellow); }

  /* Timeframe selector */
  .tf-btn {
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.2s;
  }
  .tf-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .tf-btn.active { background: rgba(0,212,255,0.12); border-color: var(--accent-cyan); color: var(--accent-cyan); }

  /* Asset Selector */
  .asset-btn {
    padding: 5px 14px;
    border-radius: 5px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .asset-btn:hover { border-color: var(--accent-cyan); }
  .asset-btn.active { background: rgba(0,212,255,0.1); border-color: var(--accent-cyan); color: var(--text-primary); }

  /* Chart Container */
  .chart-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }

  /* Scan animation on signal */
  @keyframes scan {
    0% { transform: translateY(-100%); opacity: 0.3; }
    100% { transform: translateY(100%); opacity: 0; }
  }
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.6), transparent);
    animation: scan 2s ease-in-out infinite;
    pointer-events: none;
  }

  /* News ticker */
  .news-ticker {
    overflow: hidden;
    white-space: nowrap;
  }
  .news-ticker-inner {
    display: inline-block;
    animation: ticker 40s linear infinite;
  }
  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Pulse animation for price update */
  @keyframes flash {
    0% { opacity: 1; }
    30% { opacity: 0.4; }
    60% { opacity: 1; }
  }
  .price-flash { animation: flash 0.3s ease; }

  /* Volume bar */
  .vol-bar {
    height: 4px;
    background: var(--accent-cyan);
    border-radius: 2px;
    opacity: 0.7;
    transition: width 0.4s;
  }

  /* Mini chart */
  .sparkline-canvas {
    width: 100%;
    height: 40px;
  }

  /* Toast notification */
  .toast-container {
    position: fixed;
    top: 70px;
    right: 16px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  .toast {
    padding: 12px 16px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    backdrop-filter: blur(20px);
    border: 1px solid;
    max-width: 280px;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 4.7s forwards;
    pointer-events: all;
    position: relative;
    overflow: hidden;
  }
  .toast::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .toast-buy { background: rgba(0,255,136,0.1); border-color: rgba(0,255,136,0.3); color: var(--accent-green); }
  .toast-buy::before { background: var(--accent-green); }
  .toast-sell { background: rgba(255,51,102,0.1); border-color: rgba(255,51,102,0.3); color: var(--accent-red); }
  .toast-sell::before { background: var(--accent-red); }
  .toast-info { background: rgba(0,212,255,0.08); border-color: rgba(0,212,255,0.25); color: var(--accent-cyan); }
  .toast-info::before { background: var(--accent-cyan); }
  @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(100%); } }

  /* Grid layout */
  .main-grid {
    display: grid;
    grid-template-columns: 260px 1fr 280px;
    grid-template-rows: auto;
    gap: 10px;
    padding: 10px;
    position: relative;
    z-index: 1;
  }
  @media (max-width: 1200px) {
    .main-grid { grid-template-columns: 220px 1fr; }
    .right-panel { display: none; }
  }
  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    .left-panel { display: none; }
  }

  /* Indicator row */
  .ind-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(30,45,61,0.5);
  }
  .ind-name { color: var(--text-secondary); font-size: 11px; }
  .ind-val { font-family: 'Space Mono', monospace; font-size: 11px; }

  /* OB Badge */
  .ob-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    border-radius: 5px;
    margin-bottom: 4px;
    border: 1px solid;
  }
  .ob-bull { background: rgba(0,255,136,0.05); border-color: rgba(0,255,136,0.2); }
  .ob-bear { background: rgba(255,51,102,0.05); border-color: rgba(255,51,102,0.2); }

  /* Watermark */
  .watermark {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
    opacity: 0.4;
    pointer-events: none;
  }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-panel) 25%, var(--bg-hover) 50%, var(--bg-panel) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  /* RR ratio badge */
  .rr-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.25);
    color: var(--accent-cyan);
  }

  /* Disclaimer banner */
  .disclaimer {
    background: rgba(255,107,53,0.07);
    border: 1px solid rgba(255,107,53,0.2);
    border-radius: 6px;
    padding: 8px 12px;
    color: rgba(255,107,53,0.8);
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    line-height: 1.5;
  }
</style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Header -->
<header class="header">
  <div style="display:flex; align-items:center; justify-content:space-between; padding: 8px 16px;">
    <div style="display:flex; align-items:center; gap:16px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="width:28px; height:28px; background: linear-gradient(135deg, #0066ff, #00d4ff); border-radius:6px; display:flex; align-items:center; justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="white">
            <path d="M2 12 L5 8 L8 10 L11 5 L14 3" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="14" cy="3" r="1.5" fill="#00ff88"/>
          </svg>
        </div>
        <span class="logo-text">QUANT<span class="logo-accent">EDGE</span> <span style="font-size:13px; letter-spacing:2px; color:var(--text-secondary)">AI</span></span>
      </div>
      <div class="disclaimer" style="max-width:380px; display:none;" id="headerDisclaimer">
        ⚠ EDUCATIONAL ONLY · NOT FINANCIAL ADVICE · 60–75% ACCURACY TARGET
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="display:flex; align-items:center; gap:6px;">
        <div class="live-dot"></div>
        <span class="mono" style="font-size:10px; color:var(--accent-green); letter-spacing:1px;">LIVE</span>
      </div>
      <div style="font-family:'Space Mono',monospace; font-size:10px; color:var(--text-secondary);" id="systemTime">--:--:--</div>
      <button onclick="toggleAlerts()" id="alertBtn" style="padding:5px 10px; border-radius:4px; background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.25); color:var(--accent-cyan); cursor:pointer; font-family:'Space Mono',monospace; font-size:10px;">🔔 ALERTS ON</button>
    </div>
  </div>
  <!-- News Ticker -->
  <div style="border-top:1px solid var(--border); padding:4px 0; background:rgba(0,0,0,0.3);">
    <div style="display:flex; align-items:center; gap:8px; padding: 0 16px;">
      <span style="font-family:'Space Mono',monospace; font-size:9px; color:var(--accent-orange); letter-spacing:2px; white-space:nowrap;">📰 NEWS</span>
      <div class="news-ticker" style="flex:1; overflow:hidden;">
        <div class="news-ticker-inner" id="newsTicker" style="font-family:'Space Mono',monospace; font-size:9px; color:var(--text-secondary);">
          Loading market news...
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Main Grid -->
<div class="main-grid">

  <!-- LEFT PANEL -->
  <div class="left-panel" style="display:flex; flex-direction:column; gap:10px;">

    <!-- Asset Selector -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Markets</span>
        <span style="font-family:'Space Mono',monospace; font-size:9px; color:var(--text-muted);">LIVE</span>
      </div>
      <div style="padding:10px; display:flex; flex-direction:column; gap:6px;">
        <div class="ticker-row active" id="btcBtn" onclick="selectAsset('BTC')">
          <div style="width:28px; height:28px; background:linear-gradient(135deg,#f7931a,#ffad33); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0;">₿</div>
          <div style="flex:1;">
            <div style="display:flex; align-items:center; justify-content:space-between;">
              <span style="font-family:'Space Mono',monospace; font-size:11px; font-weight:700;">BTC/USD</span>
              <span class="price-change up" id="btcChange">+0.00%</span>
            </div>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-top:2px;">
              <span class="price-display" id="btcPrice" style="font-size:14px;">--,---</span>
              <span style="font-size:9px; color:var(--text-muted);">CRYPTO</span>
            </div>
          </div>
        </div>
        <div class="ticker-row" id="goldBtn" onclick="selectAsset('XAU')">
          <div style="width:28px; height:28px; background:linear-gradient(135deg,#ffd700,#ffec80); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0;">Au</div>
          <div style="flex:1;">
            <div style="display:flex; align-items:center; justify-content:space-between;">
              <span style="font-family:'Space Mono',monospace; font-size:11px; font-weight:700;">XAU/USD</span>
              <span class="price-change up" id="goldChange">+0.00%</span>
            </div>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-top:2px;">
              <span class="price-display" id="goldPrice" style="font-size:14px;">--,---</span>
              <span style="font-size:9px; color:var(--text-muted);">METAL</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Signal Box -->
    <div id="signalBox" class="signal-box wait">
      <div class="signal-box-inner">
        <div style="font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--text-muted); margin-bottom:8px;">AI SIGNAL</div>
        <div class="signal-label" id="signalLabel">WAIT</div>
        <div style="margin-top:6px; font-family:'Space Mono',monospace; font-size:10
